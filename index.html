<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Colegio Monteclaro · Educación con vista al futuro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: 'ss01', 'cv11';
      }
      * { box-sizing: border-box; }
      button:hover { transform: translateY(-1px); }
      a { transition: opacity 0.15s ease; }
      a:hover { opacity: 0.7; }
      @keyframes mc-scroll { from { transform: translateX(0); } to { transform: translateX(-33.333%); } }
      ::-webkit-scrollbar { display: none; }
      ::selection { background: var(--accent); color: white; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
